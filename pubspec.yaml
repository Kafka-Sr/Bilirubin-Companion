name: bilirubin_companion
description: Offline-first Flutter companion for bilirubin gun device.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  drift: ^2.28.1
  drift_flutter: ^0.2.5
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2
  pointycastle: ^3.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.1
  build_runner: ^2.6.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample/
